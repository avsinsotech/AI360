<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LOS Icon Set — AVS InSoTech</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Sans+Devanagari:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#EEF2F8;padding:24px;min-height:100vh;}
.page{max-width:960px;margin:0 auto;}
.toolbar{background:white;border-radius:10px;padding:14px 20px;display:flex;align-items:center;gap:12px;margin-bottom:20px;box-shadow:0 2px 12px rgba(31,56,100,.1);}
.toolbar h2{font-size:15px;font-weight:700;color:#1F3864;flex:1;}
.btn{padding:7px 16px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;}
.btn-dl{background:#1F3864;color:white;}
.btn-dl:hover{background:#162A52;}
.section{background:white;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 16px rgba(31,56,100,.08);}
.section h3{font-size:12px;font-weight:700;color:#5A6A82;text-transform:uppercase;letter-spacing:1px;margin-bottom:18px;padding-bottom:8px;border-bottom:1.5px solid #EEF2F8;}

/* Icon grid */
.icon-grid{display:flex;flex-wrap:wrap;gap:16px;}
.icon-card{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:transform .15s;}
.icon-card:hover{transform:translateY(-2px);}
.icon-card span{font-size:11px;font-weight:600;color:#1F3864;text-align:center;}
.icon-card small{font-size:10px;color:#8899AA;font-family:'Noto Sans Devanagari',sans-serif;text-align:center;}

/* SVG Icon base */
.ic{display:block;border-radius:12px;}
.ic-sm{width:44px;height:44px;}
.ic-md{width:64px;height:64px;}
.ic-lg{width:96px;height:96px;}

/* Download row */
.dl-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1.5px dashed #D0D9EA;}
.size-chip{padding:5px 12px;background:#EEF2F8;border-radius:20px;font-size:11px;font-weight:700;color:#1F3864;cursor:pointer;border:1.5px solid #D0D9EA;transition:all .18s;}
.size-chip.active,.size-chip:hover{background:#1F3864;color:white;border-color:#1F3864;}
</style>
</head>
<body>
<div class="page">

<div class="toolbar">
  <h2>🏦  LOS Software — Loan Type Icon Set | AVS InSoTech Pvt. Ltd.</h2>
  <button class="btn btn-dl" onclick="downloadAll()">⬇ Download All SVG</button>
</div>

<!-- SMALL (44px) -->
<div class="section">
  <h3>Small Icons — 44×44px (for list items, table rows)</h3>
  <div class="icon-grid" id="grid-sm"></div>
</div>

<!-- MEDIUM (64px) -->
<div class="section">
  <h3>Medium Icons — 64×64px (for cards, tiles, modal selectors)</h3>
  <div class="icon-grid" id="grid-md"></div>
</div>

<!-- LARGE (96px) -->
<div class="section">
  <h3>Large Icons — 96×96px (for dashboard widgets, empty states)</h3>
  <div class="icon-grid" id="grid-lg"></div>
</div>

</div>

<script>
const loans = [
  {
    id:"personal", label:"Personal Loan", mr:"व्यक्तिगत कर्ज",
    bg:"#EEF2F8", stroke:"#2058A8",
    draw(s) {
      const c=s/2, r=s*0.22;
      return `<circle cx="${c}" cy="${c*0.62}" r="${r}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}" stroke-linecap="round"/>
        <path d="M${s*0.12} ${s*0.88} Q${s*0.12} ${s*0.68} ${c} ${s*0.68} Q${s*0.88} ${s*0.68} ${s*0.88} ${s*0.88}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}" stroke-linecap="round"/>`;
    }
  },
  {
    id:"business", label:"Business Loan", mr:"व्यवसाय कर्ज",
    bg:"#E8F5EB", stroke:"#1B6B2E",
    draw(s) {
      const p=s*0.18, w=s*0.64, h=s*0.48, y=s*0.36;
      return `<rect x="${p}" y="${y}" width="${w}" height="${h}" rx="${s*0.06}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}"/>
        <path d="M${s*0.34} ${y} L${s*0.34} ${s*0.22} Q${s*0.34} ${s*0.12} ${s/2} ${s*0.12} Q${s*0.66} ${s*0.12} ${s*0.66} ${s*0.22} L${s*0.66} ${y}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}"/>
        <line x1="${p}" y1="${s*0.6}" x2="${p+w}" y2="${s*0.6}" stroke="${this.stroke}" stroke-width="${s*0.035}"/>
        <line x1="${s/2}" y1="${s*0.52}" x2="${s/2}" y2="${s*0.68}" stroke="${this.stroke}" stroke-width="${s*0.035}"/>`;
    }
  },
  {
    id:"home", label:"Home Loan", mr:"गृह कर्ज",
    bg:"#EBF2FF", stroke:"#2058A8",
    draw(s) {
      const c=s/2, m=s*0.14;
      return `<polygon points="${c},${m} ${m},${s*0.52} ${s-m},${s*0.52}" fill="${this.stroke}" opacity="0.85"/>
        <rect x="${s*0.26}" y="${s*0.52}" width="${s*0.48}" height="${s*0.36}" rx="${s*0.04}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}"/>
        <rect x="${s*0.38}" y="${s*0.62}" width="${s*0.24}" height="${s*0.26}" rx="${s*0.04}" fill="${this.stroke}" opacity="0.35"/>`;
    }
  },
  {
    id:"vehicle", label:"Vehicle Loan", mr:"वाहन कर्ज",
    bg:"#FFF3EA", stroke:"#C05000",
    draw(s) {
      const m=s*0.1;
      return `<rect x="${m}" y="${s*0.42}" width="${s*0.8}" height="${s*0.36}" rx="${s*0.1}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}"/>
        <path d="M${s*0.18} ${s*0.42} L${s*0.3} ${s*0.2} L${s*0.7} ${s*0.2} L${s*0.82} ${s*0.42}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}" stroke-linejoin="round"/>
        <circle cx="${s*0.26}" cy="${s*0.78}" r="${s*0.12}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}"/>
        <circle cx="${s*0.74}" cy="${s*0.78}" r="${s*0.12}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}"/>`;
    }
  },
  {
    id:"gold", label:"Gold Loan", mr:"सोने कर्ज",
    bg:"#FFF8E0", stroke:"#C8A000",
    draw(s) {
      const c=s/2, rx=s*0.38, ry=s*0.1;
      return `<ellipse cx="${c}" cy="${s*0.72}" rx="${rx}" ry="${ry}" fill="${this.stroke}" opacity="0.55"/>
        <rect x="${s*0.15}" y="${s*0.38}" width="${rx*2}" height="${s*0.3}" rx="${s*0.05}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}"/>
        <ellipse cx="${c}" cy="${s*0.38}" rx="${rx}" ry="${ry}" fill="${this.stroke}" opacity="0.9"/>
        <ellipse cx="${c}" cy="${s*0.54}" rx="${rx}" ry="${ry}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.03}" stroke-dasharray="4,3" opacity="0.7"/>`;
    }
  },
  {
    id:"education", label:"Education Loan", mr:"शिक्षण कर्ज",
    bg:"#F0E8FF", stroke:"#5B2D8B",
    draw(s) {
      const c=s/2;
      return `<polygon points="${c},${s*0.14} ${s*0.1},${s*0.4} ${c},${s*0.52} ${s*0.9},${s*0.4}" fill="${this.stroke}" opacity="0.82"/>
        <path d="M${s*0.72} ${s*0.43} L${s*0.72} ${s*0.68} Q${c} ${s*0.8} ${s*0.28} ${s*0.68} L${s*0.28} ${s*0.43}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}"/>
        <line x1="${s*0.9}" y1="${s*0.4}" x2="${s*0.9}" y2="${s*0.62}" stroke="${this.stroke}" stroke-width="${s*0.04}" stroke-linecap="round"/>
        <circle cx="${s*0.9}" cy="${s*0.63}" r="${s*0.06}" fill="${this.stroke}"/>`;
    }
  },
  {
    id:"agriculture", label:"Agriculture Loan", mr:"कृषी कर्ज",
    bg:"#E8F5F5", stroke:"#006B6B",
    draw(s) {
      const c=s/2;
      return `<line x1="${c}" y1="${s*0.82}" x2="${c}" y2="${s*0.18}" stroke="${this.stroke}" stroke-width="${s*0.05}" stroke-linecap="round"/>
        <path d="M${c} ${s*0.68} C${s*0.3} ${s*0.62} ${s*0.18} ${s*0.46} ${s*0.28} ${s*0.28} C${s*0.4} ${s*0.46} ${c} ${s*0.56} ${c} ${s*0.68}" fill="${this.stroke}" opacity="0.75"/>
        <path d="M${c} ${s*0.58} C${s*0.7} ${s*0.52} ${s*0.82} ${s*0.36} ${s*0.72} ${s*0.18} C${s*0.6} ${s*0.36} ${c} ${s*0.46} ${c} ${s*0.58}" fill="${this.stroke}" opacity="0.75"/>`;
    }
  },
  {
    id:"microfinance", label:"Microfinance", mr:"सूक्ष्म कर्ज",
    bg:"#FFF0EE", stroke:"#B03020",
    draw(s) {
      return `<circle cx="${s*0.35}" cy="${s*0.35}" r="${s*0.17}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}"/>
        <path d="M${s*0.08} ${s*0.76} Q${s*0.08} ${s*0.56} ${s*0.35} ${s*0.56} Q${s*0.62} ${s*0.56} ${s*0.62} ${s*0.76}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}" stroke-linecap="round"/>
        <circle cx="${s*0.68}" cy="${s*0.37}" r="${s*0.13}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.038}"/>
        <path d="M${s*0.48} ${s*0.76} Q${s*0.52} ${s*0.6} ${s*0.68} ${s*0.6} Q${s*0.86} ${s*0.6} ${s*0.9} ${s*0.76}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.038}" stroke-linecap="round"/>`;
    }
  },
  {
    id:"property", label:"Property Loan", mr:"मालमत्ता कर्ज",
    bg:"#EBF2FF", stroke:"#1F3864",
    draw(s) {
      return `<rect x="${s*0.12}" y="${s*0.28}" width="${s*0.76}" height="${s*0.58}" rx="${s*0.05}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}"/>
        <line x1="${s*0.12}" y1="${s*0.28}" x2="${s/2}" y2="${s*0.12}" stroke="${this.stroke}" stroke-width="${s*0.04}"/>
        <line x1="${s*0.88}" y1="${s*0.28}" x2="${s/2}" y2="${s*0.12}" stroke="${this.stroke}" stroke-width="${s*0.04}"/>
        <rect x="${s*0.3}" y="${s*0.52}" width="${s*0.18}" height="${s*0.34}" rx="${s*0.03}" fill="${this.stroke}" opacity="0.4"/>
        <rect x="${s*0.54}" y="${s*0.44}" width="${s*0.22}" height="${s*0.2}" rx="${s*0.04}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.038}"/>`;
    }
  },
  {
    id:"deposit", label:"FD / Deposit", mr:"ठेव / FD",
    bg:"#E8F5EB", stroke:"#1B6B2E",
    draw(s) {
      const c=s/2;
      return `<circle cx="${c}" cy="${c}" r="${s*0.38}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}"/>
        <text x="${c}" y="${c+s*0.07}" font-family="DM Sans,sans-serif" font-size="${s*0.28}" font-weight="700" fill="${this.stroke}" text-anchor="middle">₹</text>`;
    }
  },
  {
    id:"emergency", label:"Emergency Loan", mr:"आपत्कालीन कर्ज",
    bg:"#FFF0EE", stroke:"#B03020",
    draw(s) {
      const c=s/2;
      return `<circle cx="${c}" cy="${c}" r="${s*0.38}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}"/>
        <line x1="${c}" y1="${s*0.22}" x2="${c}" y2="${s*0.58}" stroke="${this.stroke}" stroke-width="${s*0.07}" stroke-linecap="round"/>
        <circle cx="${c}" cy="${s*0.72}" r="${s*0.055}" fill="${this.stroke}"/>`;
    }
  },
  {
    id:"overdraft", label:"OD / Overdraft", mr:"ओव्हरड्राफ्ट",
    bg:"#FFF8E0", stroke:"#C05000",
    draw(s) {
      const c=s/2;
      return `<rect x="${s*0.12}" y="${s*0.28}" width="${s*0.76}" height="${s*0.48}" rx="${s*0.08}" fill="none" stroke="${this.stroke}" stroke-width="${s*0.045}"/>
        <rect x="${s*0.12}" y="${s*0.28}" width="${s*0.76}" height="${s*0.18}" rx="${s*0.08}" fill="${this.stroke}" opacity="0.18"/>
        <line x1="${s*0.3}" y1="${s*0.56}" x2="${s*0.7}" y2="${s*0.56}" stroke="${this.stroke}" stroke-width="${s*0.04}" stroke-linecap="round"/>
        <line x1="${s*0.3}" y1="${s*0.66}" x2="${s*0.55}" y2="${s*0.66}" stroke="${this.stroke}" stroke-width="${s*0.04}" stroke-linecap="round"/>`;
    }
  },
];

function makeSvg(loan, size) {
  const r = size < 48 ? 10 : size < 72 ? 14 : 18;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
  <rect width="${size}" height="${size}" rx="${r}" fill="${loan.bg}"/>
  ${loan.draw(size)}
</svg>`;
}

function buildGrid(containerId, size, cls) {
  const container = document.getElementById(containerId);
  loans.forEach(loan => {
    const card = document.createElement('div');
    card.className = 'icon-card';
    card.title = 'Click to download';
    card.innerHTML = `
      <div class="ic ${cls}">${makeSvg(loan, size)}</div>
      <span>${loan.label}</span>
      <small>${loan.mr}</small>
    `;
    card.addEventListener('click', () => downloadSvg(loan, size));
    container.appendChild(card);
  });
}

function downloadSvg(loan, size) {
  const svg = makeSvg(loan, size);
  const blob = new Blob([svg], {type:'image/svg+xml'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `icon_${loan.id}_${size}x${size}.svg`;
  a.click();
}

function downloadAll() {
  loans.forEach((loan, i) => {
    setTimeout(() => {
      [44, 64, 96].forEach(sz => downloadSvg(loan, sz));
    }, i * 200);
  });
}

buildGrid('grid-sm', 44, 'ic-sm');
buildGrid('grid-md', 64, 'ic-md');
buildGrid('grid-lg', 96, 'ic-lg');
</script>
</body>
</html>
