<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/icon.svg" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AVS Saarthi AI - Your personal AI assistant powered by Google Gemini or OpenAI" />
    <title>AI 360</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      /* Extreme reset to hide Google Translate banner */
      #goog-te-banner-frame, 
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate,
      .skiptranslate,
      #goog-gt-tt,
      .goog-te-spinner-pos,
      .goog-te-menu-frame,
      .goog-te-menu2-frame {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
      }
      body { top: 0 !important; }
      .goog-logo-link { display: none !important; }
    </style>
  </head>
  <body>
    <!-- <a href="#root" class="skip-link">Skip to content</a> -->
    <div id="root"></div>
    <div id="google_translate_element"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en', 
          includedLanguages: 'en,mr,hi',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.jsx"></script>
    <script type="text/javascript">
      // Bruteforce reset top margin that Google Translate injects
      setInterval(function() {
        if (document.body.style.top !== "0px") {
          document.body.style.top = "0px";
          document.body.style.position = "static";
        }
        var banner = document.querySelector('.goog-te-banner-frame');
        if (banner) banner.style.display = 'none';
      }, 200);
    </script>
  </body>
</html>
